<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senha redefinida | Firetool</title>

  <style>
    :root {
      --primary: #2563eb;
      --success: #16a34a;
      --text: #111827;
      --muted: #6b7280;
      --bg: linear-gradient(135deg, #f9fafb, #eef2ff);
      --card: #ffffff;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, Ubuntu, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: var(--card);
      max-width: 430px;
      width: 100%;
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.10),
        0 6px 14px rgba(0, 0, 0, 0.05);
    }

    .logo {
      margin-bottom: 16px;
    }

    .logo img {
      max-width: 120px;
      height: auto;
    }

    .icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: rgba(22, 163, 74, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 24px;
      height: 24px;
      color: var(--success);
    }

    h1 {
      color: var(--text);
      font-size: 1.35rem;
      margin: 0 0 10px;
      font-weight: 600;
    }

    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin: 0;
    }

    .divider {
      margin: 18px auto 14px;
      width: 50px;
      height: 3px;
      background: var(--primary);
      border-radius: 999px;
      opacity: 0.2;
    }

    .note {
      margin-top: 12px;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img
        src="https://ldqsqzdutpqvbusopgfm.supabase.co/storage/v1/object/public/firetool-email-logo/Logo_to_email_400x400.png"
        alt="Firetool Logo"
      />
    </div>

    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M20 6L9 17l-5-5" />
      </svg>
    </div>

    <h1>Senha redefinida com sucesso</h1>

    <p>
      Sua senha foi alterada com sucesso.<br />
      Agora você pode retornar ao aplicativo e realizar o login utilizando sua nova senha.
    </p>

    <div class="divider"></div>

    <div class="note">
      Você pode fechar esta página com segurança.
    </div>
  </div>
</body>
</html>
